<!DOCTYPE html>
<html>
    <head>
        <title>Lumora - Shopping Cart</title>
        <link rel="stylesheet" href="..\css\cart.css">
        <script src="..\javascript\cart.js" defer></script>
    </head>
    <body>
        
        <main>
            <section class="page_name"><h1>Shopping Cart</h1></section>
            <section class="everything">
            <section class="cart_details">
                <div class="products">
                    <div class="products_header">
                        <span></span> <!-- مكان زرار X -->
                        <span></span> <!-- مكان الصورة -->
                        <span>Product</span>
                        <span>Unit Price</span>
                        <span>Quantity</span>
                        <span>Total</span>
                    </div>
                    
                </div>
                <div class="container">
                    <form class="coupon" method="post">
                    <p>Have a promo code?</p>
                    <div class="coupon_row">
                    <input type="text" placeholder=" Enter coupon code" name="coupon">
                    <button class="apply" type="submit">Apply</button>
                </div>
                    <p class="promo_message"></p>
                    </form>
                <div class="wishlist">
                    <p>Don't wanna buy now?</p>
                    <a href="wishlist.html" title="Go To Wishlist Page "> &lt; Save for later</a>
                </div>
                </div>
            </section>
            <section class="cart_totals">
                <h2>Cart Totals</h2>
                <div class="total_row">
                    <span>Total:</span>
                    <span>EGP</span>
                </div>
                <div class="links">
                    <button class="checkout" onclick="window.location.href='checkout.html'" title="Go To Checkout">
                Proceed to Checkout
                </button>
                <a href="..\index.html" title="Go To Home Page"> &lt; Continue Shopping</a>
                </div>
            </section>
            </section>
        </main>
        <footer></footer>
    </body>
</html>
