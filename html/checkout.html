<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="checkout.css">
    <title>Checkout</title>
</head>

<body>
<main>
    <div>
        <h1 style="font-size:50px;">Checkout</h1>

    </div>
    <div class="organize">
     <div class="left">
        <form class="l">
        <section>
            <fieldset>
                <legend><img src="contact.png" width="40px"> <u>Contact Information:</u></legend>

                <table id="TableContactInformation">
                    <tr>
                        <td><label for="first_name">First Name</label></td>
                        <td><input type="text" id="first_name" required></td>
                    </tr>

                    <tr>
                        <td><label for="last_name">Last Name</label></td>
                        <td><input type="text" id="last_name" required></td>
                    </tr>

                    <tr>
                        <td><label for="email">Email</label></td>
                        <td><input type="email" id="email" required></td>
                    </tr>

                    <tr>
                        <td><label for="phone">Phone Number</label></td>
                        <td><input type="tel" id="phone" required></td>
                    </tr>
                </table>

            </fieldset>
        </section>

        <section>
            <fieldset>
                <legend><img src="shipping.png" width="40px"> <u>Shipping Information:</u></legend>

                <table>
                    <tr>
                        <td><label for="country">Country</label></td>
                        <td><input type="text" id="country" required></td>
                    </tr>

                    <tr>
                        <td><label for="city">City</label></td>
                        <td><input type="text" id="city" required></td>
                    </tr>

                    <tr>
                        <td><label for="address">Address</label></td>
                        <td><input type="text" id="address" required></td>
                    </tr>
                </table>
            </fieldset>
        </section>

       
    </form> 
    </div>
    <div class="right">
        <form class="r">
         <section>
            <fieldset>
                <legend><img src="pay.png" width="40px"> <u>Payment Method:</u></legend>

                <table>
                    <tr>
                        <td>
                            <input type="radio" name="payment" id="cash" value="cash" >
                            <label for="cash">Cash on Delivery</label>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <input type="radio" name="payment" id="visa" value="visa" >
                            <label for="visa">Visa</label>
                        </td>
                    </tr>
                    
                    <tr class="inf-visa">
                        <td><label for="card_number">Card Number</label></td>
                        <td><input type="number" id="card_number"></td>
                    </tr>

                    <tr class="inf-visa">
                        <td><label for="exp">Exp. Date</label></td>
                        <td><input type="month" id="exp"></td>
                    </tr>

                    <tr class="inf-visa">
                        <td><label for="cvv">CVV</label></td>
                        <td><input type="number" id="cvv"></td>

                    </tr>
                    
                </table>

            </fieldset>
        </section>   
        <section>
            <fieldset>
              <legend><img src="order.png" width="40px"> <u>Order Summary:</u></legend>
                <table>
                    <tr>
                        <td>Total Price Items</td>
                        <td id="items">0</td>
                    </tr>

                    <tr>
                        <td>Delivery Cost</td>
                        <td id="delivery">50</td>
                    </tr>

                    <tr>
                        <td><strong>Total to Pay</strong></td>
                        <td id="total"><strong>50</strong></td>
                    </tr>
                    
                       
                </table>

            </fieldset>
        </section>
       
        </form>
    </div>
    </div>
    <form onsubmit="goToPage(); return false;">
         <input type="submit" value="Pay Now">
    </form>
        
</main>
<script src="checkout.js"></script>
</body>
</html>
