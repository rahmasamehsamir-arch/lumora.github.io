<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/checkout.css">
    <title>Checkout</title>
</head>

<body>
<main>
    <div>
        <h1 style="font-size:50 ;" >Checkout</h1>

    </div>
    <form >

        <!-- Contact Information -->
        <section >
            <fieldset>
                <legend  >Contact Information</legend>

                <table id="TableContactInformation">
                    <tr>
                        <td><label for="first_name">First Name</label></td>
                        <td><input type="text" id="first_name" required></td>
                    </tr>

                    <tr>
                        <td><label for="last_name">Last Name</label></td>
                        <td><input type="text" id="last_name" required></td>
                    </tr>

                    <tr>
                        <td><label for="email">Email</label></td>
                        <td><input type="email" id="email" required></td>
                    </tr>

                    <tr>
                        <td><label for="phone">Phone Number</label></td>
                        <td><input type="tel" id="phone" required></td>
                    </tr>
                </table>

            </fieldset>
        </section>

        <!-- Shipping Information -->
        <section >
            <fieldset>
                <legend >Shipping Information</legend>

                <table>
                    <tr>
                        <td><label for="country">Country</label></td>
                        <td><input type="text" id="country" required></td>
                    </tr>

                    <tr>
                        <td><label for="city">City</label></td>
                        <td><input type="text" id="city" required></td>
                    </tr>

                    <tr>
                        <td><label for="address">Address</label></td>
                        <td><input type="text" id="address" required></td>
                    </tr>
                </table>

            </fieldset>
        </section>

        <!-- Payment Method -->
        <section>
            <fieldset>
                <legend>Payment Method</legend>

                <table>
                    <tr>
                        <td>
                            <input type="radio" name="payment" id="cash" value="cash" >
                            <label for="cash">Cash on Delivery</label>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <input type="radio" name="payment" id="visa" value="visa" >
                            <label for="visa">Visa</label>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="card_number">Card Number</label></td>
                        <td><input type="number" id="card_number" disabled></td>
                    </tr>

                    <tr>
                        <td><label for="exp">Exp. Date</label></td>
                        <td><input type="month" id="exp" disabled></td>
                    </tr>

                    <tr>
                        <td><label for="cvv">CVV</label></td>
                        <td><input type="number" id="cvv" disabled></td>

                    </tr>
                </table>

            </fieldset>
        </section>

        <!-- Price Summary -->
        <section >
            <fieldset>
                <legend >Order Summary</legend>

                <table>
                    <tr>
                        <td>Total Price Items</td>
                        <td>500 L.E</td>
                    </tr>

                    <tr>
                        <td>Delivery Cost</td>
                        <td>50 L.E</td>
                    </tr>

                    <tr>
                        <td><strong>Total to Pay</strong></td>
                        <td><strong>550 L.E</strong></td>
                    </tr>
                    <tr>
                      <td><input type="submit" value="Pay Now"></td>
                    </tr>
                </table>

            </fieldset>
        </section>
   </form>

</main>
</body>
</html>
