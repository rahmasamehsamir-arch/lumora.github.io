
<!doctype html>
<html>     
    <head>
        <meta charset='UTF-8'/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lumora-sign-up</title>
        <link rel="stylesheet" href="../css/signup.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
                
    </head>
    <body>
        <body>

        <main>
        <div class="sign-up">
            <p class="page"> Sign Up</p> 
            <p class="fill"> Please fill in the form to create an account :</p>
        </div>
            <section>
                <form>
                    <label class="first">Your First Name</label><br> 
                    <input class="in_first" type="text"><br>
                    <label class="last">Your Last Name</label><br>
                    <input class="in_last" type="text"><br>
                    <label class="phone">Phone-Number</label><br>
                    <input class="in_phone" type="tel"><br>
                    <label class="email">Your-Email</label><br>
                    <input class="in_email" type="Email">
                    <br>
                  <label class="password">Password</label><br>
                    <input class="in_password" type="password"><br>
                  <label class="confirm">Confirm-Password</label> <br>
                    <input class="in_confirm" type="password"><br>

                   
                    <br>
                    <button class="save" type="submit">Sign Up</button>
                </form>
                <p class="have">Already have an account?<a class="log" href="login.html">login</a></p><br>
            </section>
        </main>
     
    </body>
    </html>
